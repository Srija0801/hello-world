name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Verify Go installation
      run: go version

    - name: Build application
      run: go build -v ./...

    - name: Run application (with visible output)
      run: |
        echo "========================"
        echo "Running Go program..."
        echo "========================"
        go run main.go
        echo "========================"
        echo "Finished execution"
